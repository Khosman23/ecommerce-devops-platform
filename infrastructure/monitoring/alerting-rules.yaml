apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: ecommerce-alerts
  namespace: monitoring
  labels:
    release: prometheus
spec:
  groups:
    - name: ecommerce.rules
      rules:
        - alert: ServiceDown
          expr: up{namespace="ecommerce"} == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Service {{ $labels.app }} is down"
            description: "Service {{ $labels.app }} has been down for more than 1 minute"

        - alert: HighCPUUsage
          expr: rate(container_cpu_usage_seconds_total{namespace="ecommerce"}[5m]) > 0.8
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High CPU usage on {{ $labels.app }}"
            description: "CPU usage is above 80% for more than 5 minutes"

        - alert: HighMemoryUsage
          expr: container_memory_usage_bytes{namespace="ecommerce"} / container_spec_memory_limit_bytes > 0.8
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High memory usage on {{ $labels.app }}"
            description: "Memory usage is above 80% for more than 5 minutes"

        - alert: HighErrorRate
          expr: rate(http_requests_total{namespace="ecommerce", status=~"5.."}[5m]) > 0.1
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "High error rate on {{ $labels.app }}"
            description: "Error rate is above 10% for more than 2 minutes"